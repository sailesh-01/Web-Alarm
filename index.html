<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Clock & Alarm</title>
  
  <!-- Google Fonts: Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Material Symbols -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Theme Toggle -->
  <button class="theme-toggle" id="theme-toggle" aria-label="Toggle Theme">
    <span class="material-symbols-rounded dark-icon">dark_mode</span>
    <span class="material-symbols-rounded light-icon" style="display: none;">light_mode</span>
  </button>

  <main class="app-container">
    <!-- Clock Display Section -->
    <section class="clock-display" id="clock-display">
      <div class="date-container" id="date">--</div>
      <div class="time-container">
        <span class="time" id="time">00:00:00</span>
        <span class="ampm" id="ampm">AM</span>
      </div>
    </section>

    <!-- Set Alarm Section -->
    <section class="alarm-settings card">
      <h2>Set Alarm</h2>
      <div class="time-inputs">
        <div class="select-wrapper">
          <select id="alarm-hour" aria-label="Hour">
            <option value="" disabled selected>Hour</option>
            <!-- Generated by JS -->
          </select>
          <span class="material-symbols-rounded arrow">expand_more</span>
        </div>
        
        <span class="separator">:</span>

        <div class="select-wrapper">
          <select id="alarm-minute" aria-label="Minute">
            <option value="" disabled selected>Minute</option>
            <!-- Generated by JS -->
          </select>
          <span class="material-symbols-rounded arrow">expand_more</span>
        </div>

        <div class="select-wrapper">
          <select id="alarm-ampm" aria-label="AM/PM">
            <option value="AM">AM</option>
            <option value="PM">PM</option>
          </select>
          <span class="material-symbols-rounded arrow">expand_more</span>
        </div>
      </div>
      
      <button class="btn btn-primary" id="btn-set-alarm">
        <span class="material-symbols-rounded">alarm_add</span> Set Alarm
      </button>
    </section>

    <!-- Active Alarms -->
    <section class="active-alarms">
      <h3>Active Alarms</h3>
      <div class="alarm-list" id="alarm-list">
        <!-- Alarm items go here via JS -->
      </div>
    </section>

  </main>

  <!-- Alarm Ringing Overlay -->
  <div class="ringing-overlay" id="ringing-overlay">
    <div class="ringing-card card">
      <span class="material-symbols-rounded ringing-icon">alarm</span>
      <h2>Wake up!</h2>
      <p id="ringing-time">00:00 AM</p>
      <div class="ringing-actions">
        <button class="btn btn-secondary" id="btn-snooze">Snooze (5m)</button>
        <button class="btn btn-danger" id="btn-stop-alarm">Stop Alarm</button>
      </div>
    </div>
  </div>

  <!-- Audio Element (Using Google's free sounds) -->
  <audio id="alarm-sound" loop preload="auto">
    <source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg">
  </audio>

  <script src="script.js"></script>
</body>
</html>
